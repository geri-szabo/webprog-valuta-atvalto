<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Árfolyam váltás</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous" defer></script>
    <script src="script.js" defer></script>
    
</head>
<body>
    <div class="container bg-dark d-flex flex-column gap-2 p-3">
        <input type="number" name="input-osszeg" id="input-osszeg" value="1">
        <input type="number" name="atvaltott-osszeg" id="atvaltott-osszeg" disabled>
        <select name="select-valuta-from" id="select-valuta-from">
            <option value="HUF">HUF</option>
            <option value="EUR">EUR</option>
            <option value="GBP">GBP</option>
            <option value="USD">USD</option>
        </select>
        <select name="select-valuta-to" id="select-valuta-to">
            <option value="HUF">HUF</option>
            <option value="EUR" selected>EUR</option>
            <option value="GBP">GBP</option>
            <option value="USD">USD</option>
        </select>
        <button id="button-valtas" class="btn btn-light">Váltás</button>
    </div>
    
</body>
</html>
